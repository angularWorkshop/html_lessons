<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Effects</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Hover Effects</h1>
  <section class="demo">
    <h2>Buttons</h2>
    <button class="btn btn--primary">Primary</button>
    <button class="btn btn--secondary">Secondary</button>
  </section>
  <section class="demo">
    <h2>Cards</h2>
    <div class="cards">
      <div class="card"><h3>Card One</h3><p>Hover me for a subtle scale effect.</p></div>
      <div class="card"><h3>Card Two</h3><p>Smooth transform with shadow change.</p></div>
    </div>
  </section>
  <section class="demo">
    <h2>Icons</h2>
    <div class="icons">
      <span class="icon">&#9733;</span>
      <span class="icon">&#9829;</span>
      <span class="icon">&#9998;</span>
    </div>
  </section>
</body>
</html>
