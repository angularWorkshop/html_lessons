<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Mosaic</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Photo Gallery</h1>
  <div class="gallery">
    <div class="gallery__item gallery__item--featured">
      <img src="https://picsum.photos/seed/1/600/400" alt="Featured photo">
    </div>
    <div class="gallery__item"><img src="https://picsum.photos/seed/2/300/300" alt="Photo 2"></div>
    <div class="gallery__item"><img src="https://picsum.photos/seed/3/300/300" alt="Photo 3"></div>
    <div class="gallery__item"><img src="https://picsum.photos/seed/4/300/300" alt="Photo 4"></div>
    <div class="gallery__item"><img src="https://picsum.photos/seed/5/300/300" alt="Photo 5"></div>
    <div class="gallery__item gallery__item--tall"><img src="https://picsum.photos/seed/6/300/600" alt="Photo 6"></div>
    <div class="gallery__item"><img src="https://picsum.photos/seed/7/300/300" alt="Photo 7"></div>
    <div class="gallery__item"><img src="https://picsum.photos/seed/8/300/300" alt="Photo 8"></div>
  </div>
</body>
</html>
