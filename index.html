<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEM Refactor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <h2 class="sidebar__title">Navigation</h2>
      <ul class="sidebar__nav">
        <li class="sidebar__item sidebar__item--active"><a href="#" class="sidebar__link">Dashboard</a></li>
        <li class="sidebar__item"><a href="#" class="sidebar__link">Profile</a></li>
        <li class="sidebar__item"><a href="#" class="sidebar__link">Settings</a></li>
      </ul>
    </aside>
    <main class="content">
      <div class="card card--featured">
        <h3 class="card__title">Featured Post</h3>
        <p class="card__text">This card has a featured style variant.</p>
        <button class="btn btn--primary btn--lg">Read More</button>
      </div>
      <div class="card">
        <h3 class="card__title">Regular Post</h3>
        <p class="card__text">This is a standard card without modifiers.</p>
        <button class="btn btn--secondary btn--sm">Read More</button>
      </div>
    </main>
  </div>
</body>
</html>
