<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nature Photo Gallery</title>
</head>
<body>
  <h1>Nature Photo Gallery</h1>
  <p>A collection of stunning nature photographs from around the world.</p>

  <figure>
    <img src="https://picsum.photos/seed/mountain/800/600" alt="Snow-capped mountain peaks glowing orange at sunrise" width="800" height="600">
    <figcaption>Mountain landscape at sunrise</figcaption>
  </figure>

  <figure>
    <img src="https://picsum.photos/seed/ocean/800/600" alt="Powerful ocean waves crashing against dark rocky coastline" width="800" height="600">
    <figcaption>Ocean waves crashing on a rocky coastline</figcaption>
  </figure>

  <figure>
    <img src="https://picsum.photos/seed/forest/800/600" alt="Dense green forest canopy with golden sunlight filtering through the leaves" width="800" height="600" loading="lazy">
    <figcaption>Dense green forest with sunlight filtering through trees</figcaption>
  </figure>

  <figure>
    <img src="https://picsum.photos/seed/desert/800/600" alt="Smooth sand dunes stretching to the horizon under a golden sky" width="800" height="600" loading="lazy">
    <figcaption>Sand dunes stretching to the horizon at golden hour</figcaption>
  </figure>

  <figure>
    <img src="https://picsum.photos/seed/waterfall/800/600" alt="Tall waterfall cascading down mossy rocks into a turquoise pool" width="800" height="600" loading="lazy">
    <figcaption>Majestic waterfall cascading into a turquoise pool</figcaption>
  </figure>

  <figure>
    <img src="https://picsum.photos/seed/aurora/800/600" alt="Green and purple northern lights reflected in a frozen lake" width="800" height="600" loading="lazy">
    <figcaption>Northern lights dancing over a frozen lake</figcaption>
  </figure>

</body>
</html>
