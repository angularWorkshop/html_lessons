<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="product-card">
    <img src="https://picsum.photos/300/200" alt="Wireless Headphones" class="product-card__image">
    <div class="product-card__body">
      <h2 class="product-card__title">Wireless Headphones</h2>
      <p class="product-card__description">Premium noise-cancelling headphones with 30-hour battery life and crystal-clear audio.</p>
      <p class="product-card__price">$149.99</p>
      <button class="product-card__button">Add to Cart</button>
    </div>
  </div>
</body>
</html>
