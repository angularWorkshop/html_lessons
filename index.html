<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place an Order</title>
</head>
<body>
  <h1>Place an Order</h1>

  <form action="/order" method="post">

    <fieldset>
      <legend>Delivery Details</legend>

      <p>
        <label for="full-name">Full Name</label><br>
        <input type="text" id="full-name" name="full_name" required>
      </p>

      <p>
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" required>
      </p>

      <p>
        <label for="postal-code">Postal Code</label><br>
        <input type="text" id="postal-code" name="postal_code" required pattern="[0-9]{5}" title="Five digit postal code">
      </p>
    </fieldset>

    <fieldset>
      <legend>Order Details</legend>

      <p>
        <label for="quantity">Quantity (1–99)</label><br>
        <input type="number" id="quantity" name="quantity" required min="1" max="99">
      </p>

      <p>
        <label for="notes">Special Instructions</label><br>
        <textarea id="notes" name="notes" rows="4" cols="40" minlength="10"></textarea>
      </p>
    </fieldset>

    <button type="submit">Place Order</button>
    <button type="submit" name="action" value="draft" formnovalidate>Save as Draft</button>

  </form>
</body>
</html>
