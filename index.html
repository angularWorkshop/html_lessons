<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Gradient Showcase</h1>
  <div class="cards">
    <div class="card card--linear">
      <h2>Linear Gradient</h2>
      <p>A smooth diagonal gradient using two HSL colors.</p>
    </div>
    <div class="card card--radial">
      <h2>Radial Gradient</h2>
      <p>A circular gradient radiating from the center.</p>
    </div>
    <div class="card card--overlay">
      <h2>Gradient Overlay</h2>
      <p>A gradient layered on top of an image background.</p>
    </div>
    <div class="card card--glass">
      <h2>Glass Effect</h2>
      <p>Semi-transparent background creating a frosted glass look.</p>
    </div>
  </div>
</body>
</html>
