<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Showcase</title>
</head>
<body>
  <h1>Media Showcase</h1>

  <h2>Featured Video</h2>

  <figure>
    <video controls poster="https://picsum.photos/seed/vidposter/640/360" width="640" height="360">
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      Your browser does not support the video element.
    </video>
    <figcaption>Big Buck Bunny — sample video</figcaption>
  </figure>

  <h2>Background Music</h2>

  <figure>
    <audio controls>
      <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
    <figcaption>Horse sound effect — sample audio</figcaption>
  </figure>

  <h2>Interactive Map</h2>

  <figure>
    <iframe
      src="https://www.openstreetmap.org/export/embed.html?bbox=-0.1318%2C51.4998%2C-0.1178%2C51.5082"
      title="Map of Westminster, London"
      width="600"
      height="400"
      loading="lazy"
      style="border: 1px solid #ccc;"></iframe>
    <figcaption>Interactive map of Westminster, London</figcaption>
  </figure>

</body>
</html>
